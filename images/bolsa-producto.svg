    <rect x="47"  y="0" width="1"  height="18"/>
    <rect x="50"  y="0" width="4"  height="18"/>
    <rect x="56"  y="0" width="1"  height="18"/>
    <rect x="59"  y="0" width="2"  height="18"/>
    <rect x="63"  y="0" width="3"  height="18"/>
    <rect x="68"  y="0" width="1"  height="18"/>
    <rect x="71"  y="0" width="2"  height="18"/>
    <rect x="75"  y="0" width="1"  height="18"/>
    <rect x="78"  y="0" width="4"  height="18"/>
    <rect x="84"  y="0" width="1"  height="18"/>
    <rect x="87"  y="0" width="2"  height="18"/>
    <rect x="91"  y="0" width="1"  height="18"/>
    <rect x="94"  y="0" width="3"  height="18"/>
    <rect x="99"  y="0" width="1"  height="18"/>
