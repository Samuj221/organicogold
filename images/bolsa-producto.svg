    <rect x="215" y="69" width="5" height="6" rx="1"/>
    <rect x="225" y="69" width="5" height="6" rx="1"/>
    <rect x="235" y="69" width="5" height="6" rx="1"/>
    <rect x="245" y="69" width="5" height="6" rx="1"/>
    <rect x="255" y="69" width="5" height="6" rx="1"/>
