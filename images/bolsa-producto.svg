    <!-- Gradientes bolsa -->
    <linearGradient id="bagBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0A0A0A"/>
      <stop offset="18%"  stop-color="#1A1209"/>
      <stop offset="50%"  stop-color="#121212"/>
      <stop offset="82%"  stop-color="#1A1209"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="bagSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#050505"/>
      <stop offset="100%" stop-color="#151008"/>
    </linearGradient>
    <linearGradient id="bagTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2A1E10"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F0D060"/>
      <stop offset="35%"  stop-color="#C9A84C"/>
      <stop offset="65%"  stop-color="#E8C96D"/>
      <stop offset="100%" stop-color="#A07830"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#E8C96D"/>
      <stop offset="50%"  stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#8B6020"/>
    </linearGradient>
    <linearGradient id="valveBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="labelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="rgba(201,168,76,0.08)"/>
      <stop offset="100%" stop-color="rgba(201,168,76,0.02)"/>
    </linearGradient>
    <radialGradient id="sheen" cx="30%" cy="20%" r="60%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.7)"/>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="bagClip">
      <path d="M 70 110 Q 68 108 68 106 L 80 50 L 420 50 L 432 106 Q 432 108 430 110 L 440 640 Q 440 660 420 665 L 80 665 Q 60 660 60 640 Z"/>
    </clipPath>
  </defs>

  <!-- SOMBRA EXTERIOR -->
